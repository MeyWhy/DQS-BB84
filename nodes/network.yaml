#Launch order:
#1. Redis           (already running)
#2. node_runner     (launches QKDLs, KME, nodes)
#3. Sifting worker  (start once, shared):
#
#celery -A workers.celery_config worker \
#--queues=sifting --concurrency=1 --loglevel=info -n sifting@%h
#
#Per-session qubit workers are managed AUTOMATICALLY by Alice nodes.

kme:
  url: "http://localhost:8000"
  key_ttl_seconds: 600

qkdl:
  url: "http://localhost:8003"

nodes:

  #Pair 1: alice-1 <-> bob-1  QKDL :8003
  - label:   alice-1
    role:    sender
    module:  nodes.alice.main
    port:    8001
    env:
      ALICE_LABEL: alice-1
      ALICE_URL:   "http://localhost:8001"
      BATCH_SIZE:  "10"
      QKDL_URL:    "http://localhost:8003"
      DISTANCE_KM:   "50"  
      
  - label:   bob-1
    role:    receiver
    module:  nodes.bob.main
    port:    8002
    env:
      BOB_LABEL: bob-1
      BOB_URL:   "http://localhost:8002"
      QKDL_URL:  "http://localhost:8003"

  #Eve - one instance, role=monitor
  - label:   eve-1
    role:    monitor
    module:  nodes.eve.main
    port:    8010
    env:
      EVE_LABEL: eve-1
      EVE_URL:   "http://localhost:8010"